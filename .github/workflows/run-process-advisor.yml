name: Run-Process-Advisor-Demo
run-name: ${{ github.workflow }}_${{ github.ref_name }}_${{ github.run_number }}.${{ github.run_attempt }}

# Demo that mimics the real run-process-advisor.yml:
#   1. A first job uses the org-owned composite action to mint a GitHub App token.
#   2. A build job pulls a PRIVATE image from the org's GHCR.
#
# Key lesson reproduced here: a job-level `container:` is resolved BEFORE any step
# runs, and a runtime App token cannot be handed to it via job outputs (masked
# secrets are stripped). So the build job mints the App token in a STEP and uses
# `docker login` + `docker run` instead of a job-level container.

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # Mirrors the "call-padv-composite-action" job: obtain a GitHub App token
  # from the org-owned composite action.
  get-app-token:
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub App token
        id: get_gh_app_token
        uses: test-org-for-backstage/edge-devops-actions-github-app-token@v1
        with:
          application_id: ${{ secrets.APP_CLIENT_ID }}
          application_private_key: ${{ secrets.APP_PRIVATE_KEY }}
          application_installation_org: test-org-for-backstage
          add_token_to_gitconfig: 'false'

      - name: Checkout repository
        uses: actions/checkout@v4

  # Mirrors the "build" job. Because the App token is minted at runtime, we do
  # NOT use a job-level `container:`. We mint the token in a step, log in to
  # GHCR, then run the private image with `docker run`.
  build:
    runs-on: ubuntu-latest
    needs: get-app-token
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get GitHub App token (for GHCR pull)
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: test-org-for-backstage

      - name: Debug - identify the App and its permissions
        env:
          TOKEN: ${{ steps.app_token.outputs.token }}
          APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
          INSTALL_ID: ${{ steps.app_token.outputs.installation-id }}
          APP_CLIENT_ID: ${{ secrets.APP_CLIENT_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          echo "app-slug        = $APP_SLUG"
          echo "installation-id = $INSTALL_ID"
          echo "== Public permissions this App REQUESTS (from /apps/<slug>) =="
          curl -s -H "Accept: application/vnd.github+json" "https://api.github.com/apps/$APP_SLUG" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(' requested_permissions=',json.dumps(d.get('permissions',{})))" || true

          echo "== GRANTED permissions per installation (via App JWT) =="
          printf '%s' "$APP_PRIVATE_KEY" > /tmp/app_key.pem
          b64() { openssl base64 -A | tr '+/' '-_' | tr -d '='; }
          now=$(date +%s); iat=$((now-60)); exp=$((now+540))
          header=$(printf '%s' '{"alg":"RS256","typ":"JWT"}' | b64)
          payload=$(printf '%s' "{\"iat\":$iat,\"exp\":$exp,\"iss\":\"$APP_CLIENT_ID\"}" | b64)
          sig=$(printf '%s' "$header.$payload" | openssl dgst -sha256 -sign /tmp/app_key.pem -binary | b64)
          JWT="$header.$payload.$sig"
          curl -s -H "Authorization: Bearer $JWT" -H "Accept: application/vnd.github+json" \
            https://api.github.com/app/installations | \
            python3 -c "import sys,json; d=json.load(sys.stdin); [print(' install_id=',i.get('id'),' account=',(i.get('account') or {}).get('login'),' repo_selection=',i.get('repository_selection'),' permissions=',json.dumps(i.get('permissions',{}))) for i in d] if isinstance(d,list) else print(d)" || true
          rm -f /tmp/app_key.pem

          echo "== Can THIS token read the package? =="
          curl -s -o /tmp/pkg.json -w "package_api_http=%{http_code}\n" -H "Authorization: Bearer $TOKEN" -H "Accept: application/vnd.github+json" \
            https://api.github.com/orgs/test-org-for-backstage/packages/container/demo-toolchain
          cat /tmp/pkg.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(' visibility=',d.get('visibility'),' msg=',d.get('message'))" || true

      - name: Debug - inspect App token capabilities
        env:
          TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          echo "== Accessible repositories for this installation token =="
          curl -s -H "Authorization: Bearer $TOKEN" -H "Accept: application/vnd.github+json" \
            https://api.github.com/installation/repositories | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print('total_count=',d.get('total_count')); [print(' repo:',r['full_name']) for r in d.get('repositories',[])]" || true
          echo "== Can the token read the package metadata? =="
          curl -s -o /tmp/pkg.json -w "package_api_http=%{http_code}\n" -H "Authorization: Bearer $TOKEN" -H "Accept: application/vnd.github+json" \
            https://api.github.com/orgs/test-org-for-backstage/packages/container/demo-toolchain
          cat /tmp/pkg.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(' visibility=',d.get('visibility'),' repo=',(d.get('repository') or {}).get('full_name'),' msg=',d.get('message'))" || true

      - name: Log in to GHCR with the App token
        run: echo "${{ steps.app_token.outputs.token }}" | docker login ghcr.io -u x-access-token --password-stdin

      - name: Pull and run the private toolchain image
        run: |
          docker run --rm \
            ghcr.io/test-org-for-backstage/demo-toolchain:1.0 \
            cat /msg
